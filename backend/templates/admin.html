{% extends "base.html" %}
{% block content %}

<h1 class="text-2xl mb-6">Admin Dashboard</h1>

<div id="stats" class="grid grid-cols-4 gap-4"></div>

<script>
fetch("/api/admin/stats/",{
 headers:{Authorization:"Bearer "+localStorage.getItem("access")}
}).then(r=>r.json()).then(s=>{
  stats.innerHTML=`
    <div class="bg-slate-800 p-4">Total Slots ${s.total_slots}</div>
    <div class="bg-slate-800 p-4">Active ${s.active_sessions}</div>
    <div class="bg-slate-800 p-4">Revenue ₹${s.total_revenue}</div>
  `;
});
</script>

{% endblock %}
