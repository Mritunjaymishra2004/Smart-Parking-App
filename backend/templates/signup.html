{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto bg-slate-800 p-6 rounded-xl">
<h2 class="text-xl mb-4">Signup</h2>

<input id="name" placeholder="Name" class="w-full p-2 mb-3 bg-slate-700 rounded">
<input id="email" placeholder="Email" class="w-full p-2 mb-3 bg-slate-700 rounded">
<input id="password" type="password" placeholder="Password" class="w-full p-2 mb-3 bg-slate-700 rounded">

<button onclick="signup()" class="w-full bg-emerald-600 p-2 rounded">Create Account</button>

<script>
async function signup(){
  await fetch("/api/auth/signup/", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:name.value,
      email:email.value,
      password:password.value,
      role:"user"
    })
  });
  window.location="/login/";
}
</script>

</div>

{% endblock %}
