{% extends "base.html" %}
{% block content %}

<h1 class="text-2xl mb-6">User Dashboard</h1>

<div id="stats" class="grid grid-cols-3 gap-4"></div>

<script>
fetch("/api/slots/").then(r=>r.json()).then(data=>{
  stats.innerHTML = `
    <div class="bg-slate-800 p-4 rounded">Total Slots: ${data.length}</div>
  `;
});
</script>

{% endblock %}
